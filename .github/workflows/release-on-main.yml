name: Release on Main Merge

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Auto Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # 태그 및 릴리즈 생성에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리 (태그 목록 조회에 필요)

      - name: Generate tag name
        id: tag
        run: |
          # 날짜 기반 태그: v2025.02.28.1 형식
          # 같은 날 여러 번 배포 시 .1, .2 ... 자동 증가
          DATE=$(TZ='Asia/Seoul' date +%Y.%m.%d)
          BASE_TAG="v${DATE}"

          # 오늘 날짜로 시작하는 기존 태그 중 가장 큰 suffix 확인
          LATEST=$(git tag --list "${BASE_TAG}.*" | sort -V | tail -n 1)

          if [ -z "$LATEST" ]; then
            NEXT_TAG="${BASE_TAG}.1"
          else
            SUFFIX=$(echo "$LATEST" | awk -F. '{print $NF}')
            NEXT_SUFFIX=$((SUFFIX + 1))
            NEXT_TAG="${BASE_TAG}.${NEXT_SUFFIX}"
          fi

          echo "tag=${NEXT_TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${NEXT_TAG}"

      - name: Get merged PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # main에 머지된 가장 최근 PR 제목과 번호 가져오기
          COMMIT_SHA="${{ github.sha }}"
          PR_INFO=$(gh pr list --state merged --base main --json number,title,mergedAt \
            --jq "sort_by(.mergedAt) | reverse | .[0] | \"#\(.number) \(.title)\"" 2>/dev/null || echo "")

          if [ -z "$PR_INFO" ]; then
            # PR이 없으면 커밋 메시지 사용
            PR_INFO=$(git log -1 --pretty=format:"%s" $COMMIT_SHA)
          fi

          echo "info=${PR_INFO}" >> $GITHUB_OUTPUT

      - name: Create tag & GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PR_INFO="${{ steps.pr.outputs.info }}"
          DATE=$(TZ='Asia/Seoul' date +"%Y년 %m월 %d일")

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "## $DATE 배포

### 변경 내역
- $PR_INFO

### 롤백 방법
\`\`\`
# Railway 콘솔에서 이전 배포를 Redeploy하거나,
# 아래 태그 기준으로 코드 확인:
git checkout $TAG
\`\`\`" \
            --latest
